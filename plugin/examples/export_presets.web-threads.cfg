; export_presets.web-threads.cfg — Godot Web export preset, THREADS variant.
;
; This is the STANDALONE-TAB / own-domain variant (a viewer link served next to
; Grafana, not inside its iframe). Copy it into your viewer project as
; `export_presets.cfg` (the Godot editor reads it on open; the comments load fine
; and are dropped only if the editor rewrites the file), then export with:
;
;     $GODOT --headless --path . --export-release "Web-threads" builds/web/index.html
;
; It MUST be served with the cross-origin-isolation headers (COOP=same-origin +
; COEP=require-corp) — tools/web/serve_coi.py does exactly that. Without them the
; build dies on the boot screen ("SharedArrayBuffer ... missing").
;
; WHAT variant/thread_support TOGGLES (the one line that matters):
;   thread_support=true -> the build uses SharedArrayBuffer, which the browser
;   exposes ONLY when the document is `crossOriginIsolated` (needs COOP+COEP on
;   the TOP-LEVEL document). A Grafana iframe never gets this — Grafana serves no
;   COEP — so a threads build inside Grafana is DEAD ON ARRIVAL (measured: the
;   Godot boot check throws on missing SharedArrayBuffer). Use this variant ONLY
;   for a standalone tab / your own COI-served domain.
;
; IMPORTANT: for these scenes threads buys NO rendering fps over the no-threads
; build (Godot 4's web renderer is single-threaded regardless) — so unless you
; specifically need it, prefer export_presets.web-nothreads.cfg, which embeds
; anywhere at the same frame rate. Measured evidence + the no-delta finding:
;   plugin-twin/library/findings/twin-web-ceiling-2026-07-10.md

[preset.0]

name="Web-threads"
platform="Web"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/web/index.html"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
; thread_support=true — needs SharedArrayBuffer + COOP/COEP. See the header block.
variant/thread_support=true
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
