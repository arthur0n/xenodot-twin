; export_presets.web-nothreads.cfg — Godot Web export preset, NO-THREADS variant.
;
; This is the EMBED-ANYWHERE / Grafana-iframe variant and the shipped recipe's
; primary build. Copy it into your viewer project as `export_presets.cfg` (the
; Godot editor reads it on open; the comments load fine and are dropped only if
; the editor rewrites the file), then export with:
;
;     $GODOT --headless --path . --export-release "Web-nothreads" builds/web/index.html
;
; Serve the result with the COI headers via tools/web/serve_coi.py and embed it in
; a Grafana text/HTML panel (see skill twin-bind-data → "Embedding in Grafana").
;
; WHAT variant/thread_support TOGGLES (the one line that matters):
;   thread_support=false  -> the build needs NO SharedArrayBuffer, so it runs in
;   ANY document, including a Grafana <iframe> whose parent is not cross-origin
;   isolated. Godot 4's web renderer runs the render loop single-threaded either
;   way, so no-threads costs ZERO rendering fps for these scenes (measured: same
;   fps as the threads build at every cell) — you give up nothing by picking it.
;   Use this variant unless you have a specific reason to need threads.
;
; Measured numbers + the threads-vs-no-threads no-delta finding:
;   plugin/library/findings/twin-web-ceiling-2026-07-10.md

[preset.0]

name="Web-nothreads"
platform="Web"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
; include_filter bakes the RAW, FileAccess-read files (the load-bearing viewer.cfg CONFIG, the binding
; map JSON, the recording NDJSON, a non-imported source glb) that export_filter=all_resources skips.
include_filter="*viewer.cfg,*.json,*.ndjson,*.glb"
; exclude_filter is the counterweight to all_resources: it sweeps EVERY imported resource, so a seat's
; spike/debug SCREENSHOTS (a tiny source PNG imports into a multi-MB VRAM texture) would ride into the
; pck and bloat it. Exclude the dev-only trees a web demo never renders — by directory (Godot's `*`
; spans `/`, so this is recursive). Conservative on purpose: it does NOT drop *.png globally (a model's
; own external textures are PNGs), only the known non-runtime dirs.
exclude_filter="spikes/*,reports/*,dist/*,tools/*,evidence/*"
export_path="builds/web/index.html"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
; thread_support=false — the embed-anywhere switch. See the header block above.
variant/thread_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
